<!DOCTYPE html>
<html>
<head>
<title>Timetable</title>
</head>

<body>

<h2>Timetable</h2>

<table border="1">

<tr>
<th>Day</th>
<th>Subject</th>
<th>Time</th>
</tr>

{% for row in data %}

<tr>
<td>{{row["day"]}}</td>
<td>{{row["subject"]}}</td>
<td>{{row["time"]}}</td>
</tr>

{% endfor %}

</table>

<br>
<a href="/">Back</a>

</body>
</html>
